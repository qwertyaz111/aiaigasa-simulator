<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>☔相合傘シミュレーター</title>
    <style>
        :root { --panel-width: 300px; }
        body { margin: 0; font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background: #ffffff; overflow: hidden; }
        #ui-panel {
            position: absolute; top: 10px; left: 10px; width: var(--panel-width);
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 15px; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            max-height: calc(100vh - 40px); overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            touch-action: auto;
        }
        #canvas-container { width: 100vw; height: 100vh; cursor: move; touch-action: none; }

        @media screen and (max-width: 480px) { :root { --panel-width: 85vw; } }
        
        @media screen and (orientation: landscape) and (max-height: 500px) {
            :root { --panel-width: 260px; }
            #ui-panel { top: 5px; left: 5px; padding: 10px; max-height: calc(100vh - 10px); }
            .app-title { font-size: 1.1rem; }
            .input-group { padding: 8px; margin-bottom: 5px; }
        }

        .panel-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        #toggle-text { font-size: 12px; font-weight: bold; color: #666; background: #eee; padding: 2px 8px; border-radius: 10px; }
        .collapsed #ui-content { display: none; }

        .app-title { font-size: 1.4rem; margin: 0; color: #333; text-align: center; font-weight: bold; flex-grow: 1; }
        .app-description { font-size: 11px; color: #777; margin-top: 8px; margin-bottom: 5px; line-height: 1.5; text-align: center; }
        
        .input-group { display: flex; flex-direction: column; gap: 8px; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .group-a { background: #fff5f0; border: 1px solid #ffe0d0; }
        .group-b { background: #f0f7ff; border: 1px solid #d0e7ff; }
        .group-c { background: #f5f5f5; border: 1px solid #ddd; }
        .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
        .section-header strong { font-size: 15px; color: #444; }
        .input-row { display: flex; gap: 8px; align-items: flex-end; width: 100%; }
        .input-item { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .hint { font-size: 10px; color: #999; margin-bottom: 2px; font-weight: bold; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: white; color: #333; width: 100%; box-sizing: border-box; }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }

        .color-picker { width: 100%; height: 38px; border: 2px solid #999; border-radius: 4px; cursor: pointer; padding: 0; background: none; appearance: none; -webkit-appearance: none; }
        
        .switch-btn { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; -webkit-tap-highlight-color: transparent; margin-bottom: 10px; }
        .switch-btn:active { background: #000; transform: scale(0.98); }

        .anim-controls { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-anim { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .btn-anim.active { background: #333; color: #fff; border-color: #333; }

        .share-btn { 
            width: 100%; padding: 12px; background: #000; color: white; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none; margin-top: 10px;
        }
        .share-btn:active { transform: scale(0.98); opacity: 0.8; }

        /* 他のツールへのリンクスタイル */
        .other-tools-link {
            margin-top: 20px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
            text-align: center;
        }
        .other-tools-link a {
            text-decoration: none;
            color: #333;
            font-size: 12px;
            font-weight: bold;
            border: 2px solid #333;
            padding: 8px 15px;
            border-radius: 30px;
            display: inline-block;
            transition: 0.3s;
            margin: 4px;
        }
        .other-tools-link a:hover {
            background: #333;
            color: #fff;
        }

        /* 利用上の注意スタイル */
        .usage-notes {
            font-size: 10px;
            color: #999;
            margin-top: 12px;
            line-height: 1.5;
            text-align: center;
        }

        .info-box { background: #ffffff; padding: 15px; border-radius: 12px; margin-top: 12px; border: 1px solid #eee; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; }
        .info-row:not(:last-child) { border-bottom: 1px dashed #eee; margin-bottom: 4px; }
        .info-label { color: #555; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .info-value { font-weight: 800; font-size: 18px; color: #2c3e50; font-variant-numeric: tabular-nums; }
        .unit { font-size: 11px; margin-left: 3px; color: #7f8c8d; font-weight: normal; }
        
        #view-label { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui-panel">
    <div class="panel-header" onclick="togglePanel()">
        <h1 class="app-title">☔相合傘シミュレーター</h1>
        <span id="toggle-text">閉じる</span>
    </div>

    <div id="ui-content">
        <p class="app-description">性別と身長から相合傘をシミュレーションできます。</p>
        
        <div class="input-group group-a">
            <div class="section-header"><strong>A</strong></div>
            <div class="input-row">
                <div class="input-item"><span class="hint">名前</span><input type="text" id="nameA" placeholder="名前A" oninput="updateScene()"></div>
                <div class="input-item" style="flex: 0.6;"><span class="hint">性別</span><select id="genderA" onchange="updateScene()"><option value="male">男</option><option value="female" selected>女</option></select></div>
            </div>
            <div class="input-row">
                <div class="input-item"><span class="hint">身長 (cm)</span><input type="number" id="heightA" value="158.0" step="0.1" oninput="updateScene()"></div>
                <div class="input-item" style="flex: 0.35;"><span class="hint">色</span><input type="color" id="colorA" class="color-picker" value="#ffcc99" oninput="updateScene()"></div>
            </div>
        </div>

        <div class="input-group group-b">
            <div class="section-header"><strong>B</strong></div>
            <div class="input-row">
                <div class="input-item"><span class="hint">名前</span><input type="text" id="nameB" placeholder="名前B" oninput="updateScene()"></div>
                <div class="input-item" style="flex: 0.6;"><span class="hint">性別</span><select id="genderB" onchange="updateScene()"><option value="male" selected>男</option><option value="female">女</option></select></div>
            </div>
            <div class="input-row">
                <div class="input-item"><span class="hint">身長 (cm)</span><input type="number" id="heightB" value="171.5" step="0.1" oninput="updateScene()"></div>
                <div class="input-item" style="flex: 0.35;"><span class="hint">色</span><input type="color" id="colorB" class="color-picker" value="#ffad60" oninput="updateScene()"></div>
            </div>
        </div>

        <div class="input-group group-c">
            <div class="section-header"><strong>傘の設定</strong></div>
            <div class="input-row">
                <div class="input-item"><span class="hint">傘の色</span><input type="color" id="colorU" class="color-picker" value="#333333" oninput="updateScene()"></div>
            </div>
        </div>

        <!-- 🤳 傘を持つ人の設定 -->
        <span class="hint">☂ 傘を持つ人</span>
        <div class="anim-controls">
            <button id="shooter-A" class="btn-anim" onclick="setShooter('A')">A</button>
            <button id="shooter-B" class="btn-anim active" onclick="setShooter('B')">B</button>
        </div>

        <!-- 📍 立ち位置の設定 -->
        <span class="hint">📍 持つ人の立ち位置</span>
        <div class="anim-controls">
            <button id="pos-left" class="btn-anim active" onclick="setSide('left')">左側</button>
            <button id="pos-right" class="btn-anim" onclick="setSide('right')">右側</button>
        </div>

        <div style="padding: 0 5px;">
            <button class="switch-btn" onclick="switchView()">🔄 視点を切り替える</button>
        </div>
        
        <div id="info-container">
            <div class="info-box" id="info"></div>
            <button class="share-btn" onclick="shareToX()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>で結果をシェアする
            </button>
            <!-- 他のツールへのリンク -->
            <div class="other-tools-link">
                <p style="font-size: 10px; color: #888; margin-bottom: 8px;">こちらもチェック❣🤩</p>
                <a href="https://qwertyaz111.github.io/my-site-hub/">ツール・シミュレーター一覧</a>
            </div>
            <!-- 利用上の注意 -->
            <div class="usage-notes">
                スクショ投稿や加工、トレース等はご自由にお楽しみください。<br>
                ※営利目的や商用利用はご遠慮ください。
            </div>
        </div>
    </div>
</div>

<div id="view-label">三人称視点</div>
<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';

    let scene, camera, renderer, clock;
    let personA, personB, walkGroup, umbrella, rainSystem;
    let currentView = '3rd';
    let rotation = { x: 0.1, y: 0.5 }, camDist = 3.5, isDragging = false, previousTouch = null;
    
    // UI状態
    let umbrellaHolder = 'B';
    let holderSide = 'left';

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f5); 
        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.rotation.order = 'YXZ';
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x888888, 2.0));
        const grid = new THREE.GridHelper(200, 400, 0xdddddd, 0xeeeeee);
        scene.add(grid);

        walkGroup = new THREE.Group();
        scene.add(walkGroup);

        createRain();
        clock = new THREE.Clock();
        setupControls();

        window.addEventListener('resize', onWindowResize);
        window.updateScene = updateScene;
        window.switchView = switchView;
        window.shareToX = shareToX;
        window.setShooter = setShooter;
        window.setSide = setSide;
        window.togglePanel = () => {
            const panel = document.getElementById('ui-panel');
            const text = document.getElementById('toggle-text');
            panel.classList.toggle('collapsed');
            text.innerText = panel.classList.contains('collapsed') ? '開く' : '閉じる';
        };

        updateScene();
        animate();
    }

    function setShooter(val) {
        umbrellaHolder = val;
        document.getElementById('shooter-A').classList.toggle('active', val === 'A');
        document.getElementById('shooter-B').classList.toggle('active', val === 'B');
        updateScene();
    }

    function setSide(val) {
        holderSide = val;
        document.getElementById('pos-left').classList.toggle('active', val === 'left');
        document.getElementById('pos-right').classList.toggle('active', val === 'right');
        updateScene();
    }

    function createRain() {
        const count = 2000;
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < count; i++) {
            vertices.push(Math.random() * 20 - 10, Math.random() * 10, Math.random() * 20 - 10);
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.02, transparent: true, opacity: 0.5 });
        rainSystem = new THREE.Points(geometry, material);
        scene.add(rainSystem);
    }

    function createUmbrella(color) {
        const group = new THREE.Group();
        const shaftLen = 0.85;
        const umbrellaRadius = 0.55;
        const umbrellaHeight = 0.25;

        const top = new THREE.Mesh(
            new THREE.ConeGeometry(umbrellaRadius, umbrellaHeight, 16, 1, true), 
            new THREE.MeshPhongMaterial({ color: color, side: THREE.DoubleSide, transparent: true, opacity: 0.9 })
        );
        top.position.y = shaftLen - (umbrellaHeight * 0.5); 
        group.add(top);
        
        const stick = new THREE.Mesh(
            new THREE.CylinderGeometry(0.01, 0.01, shaftLen),
            new THREE.MeshPhongMaterial({ color: 0x222222 })
        );
        stick.position.y = shaftLen / 2;
        group.add(stick);

        const tip = new THREE.Mesh(
            new THREE.CylinderGeometry(0.01, 0.01, 0.05),
            new THREE.MeshPhongMaterial({ color: 0x222222 })
        );
        tip.position.y = shaftLen + 0.025;
        group.add(tip);

        const handle = new THREE.Mesh(
            new THREE.TorusGeometry(0.04, 0.01, 8, 16, Math.PI),
            new THREE.MeshPhongMaterial({ color: 0x222222 })
        );
        handle.position.set(0.04, 0, 0);
        handle.rotation.z = Math.PI;
        group.add(handle);

        group.userData = { shaftLen: shaftLen };
        return group;
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function createMannequin(color, heightCm, gender, name, role, isHolder, hSide) {
        const group = new THREE.Group();
        const h = heightCm * 0.01;
        const bodyMat = new THREE.MeshPhongMaterial({ color: color, transparent: true, opacity: 0.85 });
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x222222 });

        const headH = h * 0.13, neckH = h * 0.05, torsoH = h * 0.37, legH = h * 0.45;
        const eyeY = h * (gender === 'male' ? 0.904 : 0.903);
        const torsoW = (gender === 'male' ? 0.26 : 0.21) * (h/1.7);
        const torsoDepth = torsoW * 0.5;

        const headBox = new THREE.Group(); headBox.position.y = eyeY;
        const head = new THREE.Mesh(new THREE.SphereGeometry(headH * 0.8, 16, 16), bodyMat);
        head.position.y = (h - headH * 0.5) - eyeY; headBox.add(head);
        [-1, 1].forEach(side => {
            const eye = new THREE.Mesh(new THREE.SphereGeometry(headH * 0.12, 12, 12), eyeMat);
            eye.position.set(side * (headH * 0.28), 0, (headH * 0.7)); headBox.add(eye);
        });
        group.add(headBox);
        group.headParts = headBox;

        const neck = new THREE.Mesh(new THREE.CylinderGeometry(headH*0.3, headH*0.3, neckH, 16), bodyMat);
        neck.position.y = h - headH - (neckH * 0.5); group.add(neck);

        const torso = new THREE.Mesh(new THREE.BoxGeometry(torsoW, torsoH, torsoDepth), bodyMat);
        torso.position.y = legH + (torsoH * 0.5); group.add(torso);

        group.arms = [];
        group.elbows = [];
        const armLen = h * 0.38;
        const segmentLen = armLen * 0.5;

        [-1, 1].forEach((side, idx) => {
            const isTargetArm = (isHolder && ((hSide === 'left' && side === 1) || (hSide === 'right' && side === -1)));
            const upperArm = new THREE.Group();
            upperArm.position.set(side * (torsoW * 0.55), legH + torsoH - (torsoW*0.1), 0);
            
            if (isTargetArm) {
                const upperMesh = new THREE.Mesh(new THREE.BoxGeometry(torsoW*0.25, segmentLen, torsoW*0.25), bodyMat);
                upperMesh.position.y = -segmentLen * 0.5;
                upperArm.add(upperMesh);
                const lowerArm = new THREE.Group();
                lowerArm.position.y = -segmentLen;
                const lowerMesh = new THREE.Mesh(new THREE.BoxGeometry(torsoW*0.25, segmentLen, torsoW*0.25), bodyMat);
                lowerMesh.position.y = -segmentLen * 0.5;
                lowerArm.add(lowerMesh);
                upperArm.add(lowerArm);
                group.elbows[idx] = lowerArm;
            } else {
                const fullArmMesh = new THREE.Mesh(new THREE.BoxGeometry(torsoW*0.25, armLen, torsoW*0.25), bodyMat);
                fullArmMesh.position.y = -armLen * 0.5;
                upperArm.add(fullArmMesh);
                upperArm.rotation.z = side * (8 * Math.PI / 180);
                group.elbows[idx] = null;
            }
            group.add(upperArm);
            group.arms[idx] = upperArm;
        });

        group.legs = [];
        [-1, 1].forEach(side => {
            const anchor = new THREE.Group(); anchor.position.set(side * (torsoW * 0.25), legH, 0);
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(torsoW*0.4, legH, torsoW*0.4), bodyMat);
            mesh.position.y = -legH * 0.5; anchor.add(mesh); group.add(anchor); group.legs.push(anchor);
        });

        const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 128;
        const ctx = canvas.getContext('2d'); ctx.font = "bold 45px sans-serif"; ctx.fillStyle = "#333"; ctx.textAlign = "center";
        const displayName = name || (role === 'B' ? 'B' : 'A');
        ctx.fillText(`${displayName} (${heightCm.toFixed(1)}cm)`, 256, 64);
        const spriteMaterial = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) });
        const sprite = new THREE.Sprite(spriteMaterial);
        sprite.scale.set(1.5, 0.38, 1); 
        sprite.position.y = h + 0.5; 
        group.add(sprite);
        group.nameTag = sprite;

        group.userData = { height: h, eyeY: eyeY, role: role, torsoW: torsoW, armSegment: segmentLen };
        return group;
    }

    function solveIK(person, armIdx, targetPos) {
        const shoulder = person.arms[armIdx];
        const elbow = person.elbows[armIdx];
        if (!elbow) return;
        const L1 = person.userData.armSegment;
        const L2 = person.userData.armSegment;
        const shoulderWorld = new THREE.Vector3();
        shoulder.getWorldPosition(shoulderWorld);
        const dx = targetPos.x - shoulderWorld.x, dy = targetPos.y - shoulderWorld.y, dz = targetPos.z - shoulderWorld.z;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        const d = Math.min(dist, (L1 + L2) * 0.98);
        const cosElbow = (d*d - L1*L1 - L2*L2) / (2 * L1 * L2);
        const elbowAngle = -Math.acos(Math.max(-1, Math.min(1, cosElbow)));
        const alpha = Math.atan2(dy, Math.sqrt(dx*dx + dz*dz));
        const beta = Math.asin((L2 * Math.sin(Math.abs(elbowAngle))) / d);
        shoulder.rotation.x = -(alpha + beta);
        shoulder.rotation.y = Math.atan2(dx, dz);
        elbow.rotation.x = elbowAngle;
    }

    function updateScene() {
        const hA = parseFloat(document.getElementById('heightA').value)||158, hB = parseFloat(document.getElementById('heightB').value)||171.5;

        if(personA) walkGroup.remove(personA); if(personB) walkGroup.remove(personB);
        if(umbrella) { if(umbrella.parent) umbrella.parent.remove(umbrella); }
        
        personA = createMannequin(document.getElementById('colorA').value, hA, document.getElementById('genderA').value, document.getElementById('nameA').value, 'A', umbrellaHolder==='A', holderSide);
        personB = createMannequin(document.getElementById('colorB').value, hB, document.getElementById('genderB').value, document.getElementById('nameB').value, 'B', umbrellaHolder==='B', holderSide === 'left' ? 'right' : 'left');
        
        const hDiffAbs = Math.abs(hA - hB);
        const minContactDist = (personA.userData.torsoW + personB.userData.torsoW) * 0.48; 
        const baseDist = 0.18; 
        const dist = Math.max(minContactDist, baseDist + (hDiffAbs * 0.0006)); 
        const offsetZ = 0.08, offsetX = 0.04; 

        if(holderSide === 'left') {
            personA.position.set(-dist + offsetX, 0, -offsetZ);
            personB.position.set(dist - offsetX, 0, offsetZ);
        } else {
            personA.position.set(dist - offsetX, 0, offsetZ);
            personB.position.set(-dist + offsetX, 0, -offsetZ);
        }

        umbrella = createUmbrella(document.getElementById('colorU').value);
        const maxHeight = Math.max(hA, hB) * 0.01;
        
        const umbrellaYOffset = 0.18; 
        const umbrellaZOffset = 0.15; 
        const targetUmbrellaY = maxHeight + umbrellaYOffset;
        const targetUmbrellaX = 0; 
        const targetUmbrellaZ = umbrellaZOffset;

        const shooter = (umbrellaHolder === 'A' ? personA : personB);
        
        let armIdx;
        if(holderSide === 'left') {
             armIdx = (umbrellaHolder === 'A' ? 1 : 0);
        } else {
             armIdx = (umbrellaHolder === 'A' ? 0 : 1);
        }

        const handTargetPos = new THREE.Vector3(targetUmbrellaX, targetUmbrellaY - umbrella.userData.shaftLen, targetUmbrellaZ);
        
        solveIK(shooter, armIdx, handTargetPos);
        const handNode = shooter.elbows[armIdx]; 
        handNode.add(umbrella);
        
        umbrella.rotation.set(0, 0, 0);
        const worldQuat = new THREE.Quaternion();
        umbrella.getWorldQuaternion(worldQuat);
        umbrella.quaternion.multiply(worldQuat.invert());
        umbrella.position.set(0, -shooter.userData.armSegment, 0);

        walkGroup.add(personA, personB);

        const nA = document.getElementById('nameA').value||'A', nB = document.getElementById('nameB').value||'B';
        
        [personA, personB].forEach(p => { 
            p.headParts.visible = true; 
            p.nameTag.visible = true;  
        });

        if(currentView !== '3rd' && currentView !== 'cam') {
            document.getElementById('view-label').innerText = currentView === 'A' ? nA+'の視点' : nB+'の視点';
            if (currentView === 'A') { personA.headParts.visible = false; personA.nameTag.visible = false; }
            if (currentView === 'B') { personB.headParts.visible = false; personB.nameTag.visible = false; }
        } else if (currentView === 'cam') {
            document.getElementById('view-label').innerText = '自由カメラ視点';
        } else {
            document.getElementById('view-label').innerText = '三人称視点';
        }

        document.getElementById('info').innerHTML = `
            <div class="info-row"><span class="info-label">📏 身長差</span><span class="info-value">${Math.abs(hA-hB).toFixed(1)}<span class="unit">cm</span></span></div>
        `;
    }

    function animate() {
        requestAnimationFrame(animate);
        if (rainSystem) {
            const positions = rainSystem.geometry.attributes.position.array;
            for (let i = 1; i < positions.length; i += 3) {
                positions[i] -= 0.1;
                if (positions[i] < 0) positions[i] = 10;
            }
            rainSystem.geometry.attributes.position.needsUpdate = true;
        }
        
        const centerPos = new THREE.Vector3(0, personA.userData.height * 0.5, 0);
        
        if (currentView === '3rd' || currentView === 'cam') {
            camera.up.set(0, 1, 0);
            camera.position.set(centerPos.x + Math.sin(rotation.y) * camDist, centerPos.y + Math.sin(rotation.x) * camDist, centerPos.z + Math.cos(rotation.y) * camDist);
            camera.lookAt(centerPos);
        } else {
            const self = (currentView === 'A' ? personA : personB);
            
            const headPos = new THREE.Vector3();
            self.headParts.getWorldPosition(headPos);
            camera.position.copy(headPos);
            
            const targetPos = new THREE.Vector3(0, 0, 10);
            self.headParts.localToWorld(targetPos);
            camera.lookAt(targetPos);
            
            camera.rotation.x += rotation.x;
            camera.rotation.y += rotation.y;
        }
        renderer.render(scene, camera);
    }

    function setupControls() {
        const c = document.getElementById('canvas-container');
        const move = (dx, dy) => {
            rotation.y -= dx * 0.005; rotation.x -= dy * 0.005;
            rotation.x = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, rotation.x));
        };
        c.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', e => { if(isDragging) move(e.movementX, e.movementY); });
        c.addEventListener('touchstart', e => { isDragging = true; previousTouch = e.touches[0]; }, { passive: false });
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', e => {
            if(!isDragging || !previousTouch) return;
            if (e.cancelable) e.preventDefault(); 
            const touch = e.touches[0];
            move(touch.clientX - previousTouch.clientX, touch.clientY - previousTouch.clientY);
            previousTouch = touch;
        }, { passive: false });
    }

    function switchView() {
        const order = ['3rd', 'A', 'B', 'cam']; 
        currentView = order[(order.indexOf(currentView) + 1) % order.length];
        updateScene();
    }

    function shareToX() {
        const nA = document.getElementById('nameA').value || 'A', nB = document.getElementById('nameB').value || 'B';
        const hA = parseFloat(document.getElementById('heightA').value) || 158.0, hB = parseFloat(document.getElementById('heightB').value) || 171.5;
        const text = `${nA}(${hA.toFixed(1)}cm)と${nB}(${hB.toFixed(1)}cm)が相合傘！\n#相合傘シミュレーター\n`;
        window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(window.location.href)}`, '_blank');
    }

    init();
</script>
</body>
</html>
